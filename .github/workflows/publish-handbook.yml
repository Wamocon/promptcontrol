# =============================================================================
# GitHub Pages - Produkthandbuch veröffentlichen
# =============================================================================
# Trigger: Jeder Push auf main, der docs/ verändert, ODER manuell ausführbar.
#          Veröffentlicht docs/ als GitHub Pages Site.
# =============================================================================

name: Publish Handbook (GitHub Pages)

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy-pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
