# =============================================================================
# Vercel Deploy - Preview (Pull Request)
# =============================================================================
# Trigger: Every push to an open pull request targeting main/master.
#          Deploys a preview URL for review before merging.
#
# Secrets required (repo level):
#   VERCEL_PROJECT_ID - Vercel Project Settings > General > Project ID
#
# Secrets at organisation level (no action needed):
#   VERCEL_TOKEN, VERCEL_ORG_ID
# =============================================================================

name: Deploy Preview (PR)

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

concurrency:
  group: deploy-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Require tests and validation to pass before deploying preview
  unit-tests:
    name: Unit Tests (gate)
    uses: ./.github/workflows/unit-tests.yml

  validation:
    name: Validation (gate)
    uses: ./.github/workflows/validation.yml

  deploy-preview:
    name: Deploy Preview to Vercel
    runs-on: ubuntu-latest
    needs: [unit-tests, validation]
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.preview_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel preview
        id: deploy
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "Preview deployed: $PREVIEW_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const body = `## Vercel Preview Deployment\n\n| Status | URL |\n|--------|-----|\n| Ready | [${previewUrl}](${previewUrl}) |\n\nDeployed from commit \`${{ github.sha }}\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
